<!DOCTYPE html>

<html>
<head>
    <title>AI Customer Support</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f4f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .chat{
            width:400px;
            height:550px;
            background:white;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            display:flex;
            flex-direction:column;
        }
        .header{
            background:#4a6cff;
            color:white;
            padding:15px;
            border-radius:12px 12px 0 0;
            font-weight:bold;
        }
        .messages{
            flex:1;
            padding:15px;
            overflow-y:auto;
        }
        .user{
            text-align:right;
            margin:10px;
        }
        .bot{
            text-align:left;
            margin:10px;
        }
        .input{
            display:flex;
            border-top:1px solid #ddd;
        }
        input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
        }
        button{
            padding:12px 18px;
            background:#4a6cff;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="chat">
    <div class="header">🛍️ AI Support Agent</div>

```
<div class="messages" id="messages"></div>

<div class="input">
    <input id="msg" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
</div>
```

</div>

<script>

const webhook = "https://ai-support-bot-bnwx.onrender.com/webhook/support";

async function send(){
    const input = document.getElementById("msg");
    const text = input.value;
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    const res = await fetch(webhook,{
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body: JSON.stringify({message:text})
    });

    const data = await res.json();
    addMessage(data.reply,"bot");
}

function addMessage(text,type){
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
